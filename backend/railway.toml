# Railway config for the Django backend service.
# Set "Root Directory" = backend in the Railway service settings.
#
# Add-ons required in Railway dashboard:
#   - PostgreSQL plugin  → DATABASE_URL is auto-injected
#   - Redis plugin       → REDIS_URL is auto-injected
#
# Env vars to set manually on this service:
#   DJANGO_SECRET_KEY       (generate: python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())")
#   DEBUG                   False
#   ALLOWED_HOSTS           * (initially), then set to your Railway domain e.g. backend.up.railway.app,deepakkushwaha.tech
#   CORS_ALLOWED_ORIGINS    https://<frontend-railway-url>.up.railway.app,https://deepakkushwaha.tech
#   REVALIDATION_SECRET     (generate: openssl rand -hex 32)
#   DEFAULT_FROM_EMAIL      noreply@deepakkushwaha.tech
#   ADMIN_EMAIL             kdeepakkushwaha@gmail.com
#   SENDGRID_API_KEY        (optional — console email fallback if blank)
#   PHONEPE_MERCHANT_ID     (optional)
#   PHONEPE_SALT_KEY        (optional)
#   PHONEPE_ENV             UAT
#   POSTHOG_API_KEY         (optional)
#   DJANGO_LOG_LEVEL        INFO

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Runs migrations against the new DB before traffic is shifted to the new deploy.
releaseCommand = "python manage.py migrate --noinput"
# Railway injects $PORT dynamically — override the Dockerfile CMD to use it.
startCommand = "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120 --access-logfile - --error-logfile -"
healthcheckPath = "/health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
