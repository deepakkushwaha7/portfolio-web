# Railway config for the Next.js frontend service.
# Set "Root Directory" = frontend in the Railway service settings.
#
# NEXT_PUBLIC_* vars are baked in at BUILD TIME.
# Railway automatically passes env vars as Docker build args — set them here
# and they will be injected into the Dockerfile ARG declarations automatically.
#
# Env vars to set on this service in Railway dashboard:
#   NEXT_PUBLIC_API_URL        https://<backend-service>.up.railway.app  (backend public URL)
#   NEXT_PUBLIC_PHONEPE_ENV    UAT
#   NEXT_PUBLIC_GA_ID          (optional)
#   NEXT_PUBLIC_POSTHOG_KEY    (optional)
#   NEXT_PUBLIC_POSTHOG_HOST   https://app.posthog.com
#   REVALIDATION_SECRET        (must match backend REVALIDATION_SECRET)
#
# After setting NEXT_PUBLIC_API_URL, trigger a redeploy so the build
# bakes the correct API URL into the static bundle.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Next.js standalone server.js reads $PORT automatically — no override needed.
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
