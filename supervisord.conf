[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid
loglevel=info

; ── Django / Gunicorn ────────────────────────────────────────────────────────
; Binds to port 8000 (internal only — never exposed to the internet).
; Next.js rewrites proxy /api/* to this process.
[program:django]
command=gunicorn core.wsgi:application
    --bind 0.0.0.0:8000
    --workers 2
    --threads 2
    --timeout 120
    --access-logfile -
    --error-logfile -
directory=/app/backend
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ── Next.js standalone ───────────────────────────────────────────────────────
; Reads $PORT from the environment — Railway injects this at runtime.
; All public traffic hits this process; /api/* is proxied to Django above.
[program:nextjs]
command=node server.js
directory=/app/frontend
environment=NODE_ENV="production",HOSTNAME="0.0.0.0"
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
