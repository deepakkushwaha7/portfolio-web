services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       portfolio_db
      POSTGRES_USER:     portfolio_user
      POSTGRES_PASSWORD: portfolio_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M

  # ── DB Migrations (runs once, exits 0) ────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py migrate --noinput
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"   # run once and exit — never restart

  # ── Django Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/media
    networks:
      - internal
      - external
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A core worker --loglevel=info --concurrency=2
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - django_media:/app/media
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "celery -A core inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Celery Beat (scheduler) ─────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    healthcheck:
      disable: true   # Beat has no HTTP server; health is implied by process uptime
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:      ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_PHONEPE_ENV:  ${NEXT_PUBLIC_PHONEPE_ENV:-UAT}
        NEXT_PUBLIC_GA_ID:        ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_POSTHOG_KEY:  ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://app.posthog.com}
        REVALIDATION_SECRET:      ${REVALIDATION_SECRET:-dev-secret}
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - external
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # mount SSL certs
      - django_static:/app/staticfiles:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal
      - external
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  django_static:
  django_media:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
  external:
    driver: bridge
